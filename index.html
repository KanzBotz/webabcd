<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Terminal // Core v2.0</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --dark-bg: #030303;
            --terminal-glow: rgba(0, 255, 102, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.2;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        .console-container {
            width: 90%;
            max-width: 750px;
            height: 80vh;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 30px var(--terminal-glow), inset 0 0 20px var(--terminal-glow);
            border-radius: 6px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .console-header {
            background: rgba(0, 255, 102, 0.1);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-green);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-green); opacity: 0.6; }

        .title-glitch {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            animation: glitch 1.5s infinite;
        }

        .console-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.95rem;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .line { line-height: 1.4; word-break: break-all; }
        .system-prefix { color: var(--neon-cyan); }
        .error-text { color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }

        .input-area {
            display: flex;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-top: 1px solid rgba(0, 255, 102, 0.4);
            align-items: center;
        }

        .prompt-symbol { margin-right: 10px; color: var(--neon-cyan); font-weight: bold; }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--neon-green);
            font-family: inherit;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(5, 5, 5, 0.95);
            flex-wrap: wrap;
            border-top: 1px solid rgba(0, 255, 102, 0.2);
        }

        .btn-neon {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 12px;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .btn-neon:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 12px var(--neon-green);
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }

        @keyframes glitch {
            0% { text-shadow: 1px 0 0 red, -1px 0 0 blue; }
            50% { text-shadow: -1px 0 0 red, 1px 0 0 cyan; }
            100% { text-shadow: 1px 0 0 red, -1px 0 0 blue; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div class="scanlines"></div>

    <div class="console-container">
        <div class="console-header">
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="title-glitch">SECURE_TERMINAL // v2.0_ONLINE</div>
            <div style="font-size: 0.7rem; color: var(--neon-cyan);">STATUS: ACTIVE</div>
        </div>

        <div class="console-body" id="screen">
            <div class="line"><span class="system-prefix">[SYSTEM]</span> Memuat antarmuka terminal... Berhasil.</div>
            <div class="line">Ketik <span style="color: #fff; font-weight: bold;">help</span> di bawah untuk melihat daftar perintah yang tersedia.</div>
        </div>

        <div class="action-buttons">
            <button class="btn-neon" onclick="runCommand('help')">help</button>
            <button class="btn-neon" onclick="runCommand('owner')">owner</button>
            <button class="btn-neon" onclick="runCommand('community')">community</button>
            <button class="btn-neon" onclick="runCommand('sosmed')">sosmed</button>
            <button class="btn-neon" onclick="runCommand('lisensi')">lisensi</button>
            <button class="btn-neon" onclick="runCommand('clear')">clear</button>
        </div>

        <div class="input-area">
            <span class="prompt-symbol">root@cyber:~$</span>
            <input type="text" id="cmd-input" placeholder="Ketik perintah di sini..." autocomplete="off" autofocus>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const letters = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 500, duration = 0.03) {
            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const input = document.getElementById('cmd-input');
        const screen = document.getElementById('screen');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                if (cmd) {
                    runCommand(cmd);
                    this.value = '';
                }
            } else {
                playBeep(350 + Math.random() * 150, 0.02);
            }
        });

        function printLine(text, isSystem = false) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = isSystem ? `<span class="system-prefix">[INFO]</span> ${text}` : text;
            screen.appendChild(line);
            screen.scrollTop = screen.scrollHeight;
        }

        function runCommand(rawCmd) {
            playBeep(700, 0.08);
            const cmd = rawCmd.toLowerCase().trim();
            printLine(`<span style="color: var(--neon-cyan)">root@cyber:~$</span> ${rawCmd}`);

            setTimeout(() => {
                switch(cmd) {
                    case 'help':
                        printLine('Daftar Perintah Terminal:<br>- <b>owner</b> : Kontak pemilik sistem<br>- <b>community</b> : Tautan grup komunitas<br>- <b>sosmed</b> : Tautan media sosial<br>- <b>lisensi</b> : Informasi lisensi perangkat lunak<br>- <b>clear</b> : Bersihkan layar terminal', true);
                        break;
                    case 'owner':
                        printLine('Owner Kanza: <a href="https://wa.me/6285716366564" target="_blank" style="color: #00f0ff; text-decoration: underline;">6285716366564</a>', true);
                        break;
                    case 'community':
                        printLine('Grup Komunitas WhatsApp: <a href="https://chat.whatsapp.com/H65wUmfUeK5Lv9Ib3nqGK4?s=cl&p=a&mlu=0&ilr=0&amv=3" target="_blank" style="color: #00f0ff; text-decoration: underline;">Gabung Komunitas</a>', true);
                        break;
                    case 'sosmed':
                        printLine('Media Sosial:<br>- TikTok: <a href="https://tiktok.com/@noirdcheelsyie" target="_blank" style="color: #00f0ff; text-decoration: underline;">@noirdcheelsyie</a><br>- Instagram: <a href="https://www.instagram.com/alwaysnoir18?igsh=MXE5bzZwcDg0dXByYQ==" target="_blank" style="color: #00f0ff; text-decoration: underline;">alwaysnoir18</a>', true);
                        break;
                    case 'lisensi':
                        printLine('<b>Kanza-ABCD Public License (KAPL) v1.0</b><br>Hak Cipta (c) 2026 Kanza. Dilarang keras memperjualbelikan atau mengubah kode sumber tanpa izin tertulis dari pemilik utama. Bebas digunakan untuk keperluan pribadi dan edukasi.', true);
                        break;
                    case 'clear':
                        screen.innerHTML = '';
                        break;
                    default:
                        printLine(`<span class="error-text">ERROR: Perintah "${rawCmd}" tidak dikenal. Ketik 'help' untuk bantuan.</span>`, true);
                }
            }, 100);
        }
    </script>
</body>
</html>
