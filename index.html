<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: url('https://ar-hosting.pages.dev/1782343925119.jpg') center/cover fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px 15px;
  font-family: 'Space Grotesk', sans-serif;
  color: #fff;
}

/* Gelap pekat dengan sedikit filter ungu murni */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(6, 6, 10, 0.92);
  z-index: -1;
}

/* Konsep tanpa box utama besar - langsung tumpukan kartu */
.wrapper {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* --- Profile Section --- */
.profile-block {
  text-align: center;
  margin-bottom: 10px;
}

.avatar-frame {
  width: 105px;
  height: 105px;
  margin: 0 auto 15px;
  position: relative;
}

/* Bingkai Kotak Futuristik untuk Foto Profil */
.avatar-frame::before {
  content: '';
  position: absolute;
  top: -6px; left: -6px; right: -6px; bottom: -6px;
  border: 2px solid #a78bfa;
  border-radius: 16px;
  animation: rotateBorder 8s linear infinite;
}

@keyframes rotateBorder {
  0%, 100% { clip-path: inset(0 0 90% 0); border-color: #a78bfa; }
  25% { clip-path: inset(0 0 0 90%); border-color: #ec4899; }
  50% { clip-path: inset(90% 0 0 0); border-color: #3b82f6; }
  75% { clip-path: inset(0 90% 0 0); border-color: #a78bfa; }
}

.avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid rgba(255, 255, 255, 0.1);
}

.profile-block h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.tagline {
  font-size: 12px;
  color: #a78bfa;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 4px;
}

/* --- Tumpukan Kartu Link (Minimalis & Tajam) --- */
.stack-card {
  display: flex;
  align-items: center;
  padding: 20px;
  background: #0f111a;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  text-decoration: none;
  color: #fff;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* Garis Glow di bagian bawah kartu saat di-hover */
.stack-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #a78bfa, #ec4899);
  transition: width 0.4s ease;
}

.stack-card:hover {
  background: #141724;
  border-color: rgba(167, 139, 250, 0.4);
  transform: scale(1.02);
}

.stack-card:hover::after {
  width: 100%;
}

.icon-box {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  object-fit: cover;
  margin-right: 18px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.text-box {
  flex: 1;
}

.title-text {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.desc-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.4);
  text-transform: uppercase;
}

.badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #ec4899;
  background: rgba(236, 72, 153, 0.1);
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid rgba(236, 72, 153, 0.2);
}

/* --- Label Kategori --- */
.label-cat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: -10px;
  padding-left: 5px;
}

/* --- Footer --- */
.system-footer {
  text-align: center;
  margin-top: 30px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.3);
}
</style>
